# Database connection
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Logging
logging.level.org.springframework.security=DEBUG

# VNPay sandbox
payment.vnpay.tmn-code=${VNPAY_TMN_CODE:}
payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
payment.vnpay.pay-url=${VNPAY_PAY_URL}
payment.vnpay.return-url=${VNPAY_RETURN_URL}
payment.vnpay.ipn-url=${VNPAY_IPN_URL}
payment.vnpay.api-url=${VNPAY_API_URL}

# Admin product image local storage
app.storage.product-images.root-directory=uploads/products

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
management.metrics.tags.application=nike-ecommerce
management.endpoints.web.base-path=/actuator
