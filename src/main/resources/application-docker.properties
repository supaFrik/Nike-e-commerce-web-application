spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Local Docker bootstrap strategy
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=false

server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/javascript,application/json

payment.vnpay.tmn-code=${VNPAY_TMN_CODE:}
payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
payment.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
payment.vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/payments/vnpay/return}
payment.vnpay.ipn-url=${VNPAY_IPN_URL:http://localhost:8080/api/payments/vnpay/ipn}
payment.vnpay.api-url=${VNPAY_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}

app.storage.product-images.root-directory=${PRODUCT_IMAGE_STORAGE_ROOT:/data/uploads/products}

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=always
management.metrics.tags.application=nike-ecommerce
