# Database connection - Production
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# JPA Settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.tomcat.additional-tld-skip-patterns=spring-boot-*.jar,jackson-*.jar,micrometer-*.jar,mysql-connector-j-*.jar,hibernate-*.jar,HikariCP-*.jar

server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/javascript,application/json

# Handle HTTP headers forwarded from reverse proxy (Nginx) or load balancer
server.forward-headers-strategy=framework
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=lax

payment.vnpay.tmn-code=${VNPAY_TMN_CODE}
payment.vnpay.hash-secret=${VNPAY_HASH_SECRET}
payment.vnpay.pay-url=${VNPAY_PAY_URL}
payment.vnpay.return-url=${VNPAY_RETURN_URL}
payment.vnpay.ipn-url=${VNPAY_IPN_URL}
payment.vnpay.api-url=${VNPAY_API_URL}

spring.application.name=nike-ecommerce
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Cloudinary configuration
cloudinary.url=${CLOUDINARY_URL:}
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# JWT
app.security.jwt.issuer=nike-ecommerce
app.security.jwt.access-token-ttl=30m
app.security.jwt.secret=${JWT_SECRET}

# OAuth2 Google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Prometheus + Actuator
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=never
management.metrics.tags.application=nike-ecommerce
