# Database connection - Production
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}

# JPA Settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

server.tomcat.additional-tld-skip-patterns=spring-*.jar,spring-boot-*.jar,jackson-*.jar,micrometer-*.jar,mysql-connector-j-*.jar,hibernate-*.jar,HikariCP-*.jar

server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/javascript,application/json

payment.vnpay.tmn-code=${VNPAY_TMN_CODE}
payment.vnpay.hash-secret=${VNPAY_HASH_SECRET}
payment.vnpay.pay-url=${VNPAY_PAY_URL}
payment.vnpay.return-url=${VNPAY_RETURN_URL}
payment.vnpay.ipn-url=${VNPAY_IPN_URL}
payment.vnpay.api-url=${VNPAY_API_URL}

# Admin product image local storage
app.storage.product-images.root-directory=${PRODUCT_IMAGE_STORAGE_ROOT}

# Prometheus + Actuator
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=never
management.metrics.tags.application=nike-ecommerce
