# Database connection - Production
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA Settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration

server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,application/javascript,application/json

payment.vnpay.tmn-code=${VNPAY_TMN_CODE:}
payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
payment.vnpay.pay-url=${VNPAY_PAY_URL:https://pay.vnpay.vn/vpcpay.html}
payment.vnpay.return-url=${VNPAY_RETURN_URL:}
payment.vnpay.ipn-url=${VNPAY_IPN_URL:}
payment.vnpay.api-url=${VNPAY_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}

# Admin product image local storage
app.storage.product-images.root-directory=${PRODUCT_IMAGE_STORAGE_ROOT:uploads/products}

# Prometheus + Actuator
management.server.port=9091
management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=never
management.metrics.tags.application=nike-ecommerce